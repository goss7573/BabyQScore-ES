{% extends "base.html" %}
{% block content %}

<style>
  :root {
    --bg-main: #FFF8F8;
    --surface: #ffffff;
    --surface-soft: #f1e8f8;
    --text: #2f2240;
    --text-soft: #625676;
    --purple: #6A1B9B;
    --purple-dark: #53157a;
    --border: #dfcfee;
    --shadow: 0 18px 40px rgba(106, 27, 155, 0.10);
  }

  body {
    background: var(--bg-main);
    font-family: "Nunito", Arial, sans-serif;
  }

  .calc-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .calc-title {
    text-align: center;
    color: var(--purple);
    font-family: "Poppins", "Montserrat", Arial, sans-serif;
    font-size: 2.4rem;
    margin-bottom: 0.4rem;
  }

  .calc-subtitle {
    text-align: center;
    color: var(--text-soft);
    margin-bottom: 2.2rem;
    font-size: 1.05rem;
  }

  .calc-card {
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2.2rem;
    box-shadow: var(--shadow);
  }

  .section-title {
    color: var(--purple);
    margin-top: 1.6rem;
    margin-bottom: 1rem;
    font-family: "Montserrat", Arial, sans-serif;
    font-size: 1.25rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .form-row .form-group {
    flex: 1;
  }

  .form-control {
    width: 100%;
    padding: 0.7rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 0.95rem;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--purple);
  }

  .checklist {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .checklist.columns {
    columns: 2;
  }

  .checklist label {
    margin-bottom: 0.3rem;
  }

  .form-hint {
    color: var(--text-soft);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  .actions {
    text-align: center;
    margin-top: 2.2rem;
  }

  .btn-primary {
    background: var(--purple);
    color: #fff;
    padding: 0.9rem 2.8rem;
    border-radius: 999px;
    border: none;
    font-weight: 700;
    font-family: "Montserrat", Arial, sans-serif;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(106, 27, 155, 0.18);
    transition: 0.2s;
  }

  .btn-primary:hover {
    background: var(--purple-dark);
    transform: translateY(-1px);
  }

  @media (max-width: 768px) {
    .checklist.columns {
      columns: 1;
    }
  }
</style>

<div class="calc-container">
  <h2 class="calc-title">Calculadora de complicaciones del embarazo</h2>
  <p class="calc-subtitle">
    Comprenda sus riesgos de parto prematuro, diabetes gestacional y preeclampsia, a partir de datos derivados del CDC.
  </p>

  <form method="POST" action="/risk_result" class="calc-card" id="risk-form">

    <h3 class="section-title">Datos demográficos e información física</h3>

    <div class="form-group">
      <label>Edad (años):</label>
      <input type="number" name="age" class="form-control" min="10" max="60" required>
    </div>

    <div class="form-group">
      <label>Raza/origen étnico:</label>
      <select name="ethnicity" class="form-control" required>
        <option value="">Seleccione...</option>
        <option>White / Blanca</option>
        <option>Black / Negra</option>
        <option>Hispanic / Hispana</option>
        <option>Asian / Asiática</option>
        <option>Native American / Indígena americana</option>
        <option>Other / Otra</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Peso antes del embarazo (libras):</label>
        <input type="number" name="weight_pre" class="form-control" step="0.1" min="60" max="600" required>
      </div>
      <div class="form-group">
        <label>Peso actual (libras):</label>
        <input type="number" name="weight_now" class="form-control" step="0.1" min="60" max="600">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Estatura (pies):</label>
        <input type="number" name="height_feet" class="form-control" min="3" max="7" required>
      </div>
      <div class="form-group">
        <label>Estatura (pulgadas):</label>
        <input type="number" name="height_inches" class="form-control" min="0" max="11" required>
      </div>
    </div>
