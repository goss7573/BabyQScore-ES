<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BabyQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO and Social Media Meta Tags -->
  <meta name="description" content="A 5-minute, research-based quiz that helps expecting moms improve their pregnancy wellness through lifestyle, nutrition, and support.">
  <meta name="keywords" content="pregnancy, wellness, babyq score, healthy pregnancy, prenatal quiz, babyqscore">
  <meta property="og:title" content="BabyQ Score – Your Pregnancy Wellness Check">
  <meta property="og:description" content="Discover your BabyQ Score – a quick, science-backed wellness check for expecting moms.">
  <meta property="og:url" content="https://www.babyqscore.org/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.babyqscore.org/static/babyq_preview.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BabyQ Score – Your Pregnancy Wellness Check">
  <meta name="twitter:description" content="Take the BabyQ quiz and see how small changes can lead to a healthier pregnancy.">
  <meta name="twitter:image" content="https://www.babyqscore.org/static/babyq_preview.png">
  <!-- Favicon and App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">

  <!-- Plausible Analytics -->
  <script defer data-domain="babyqscore.org" src="https://plausible.io/js/script.js"></script>

  <!-- External CSS for global styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#fef6ff; }
    header{ background:#6a1b9a; padding:10px 20px; display:flex; justify-content:space-between; align-items:center;}
    header h1{ color:#fff; margin:0; font-size:24px;}
    nav{ display:flex; gap:16px; }
    nav a{ color:#fff; text-decoration:none; font-weight:bold; }
    main{ padding:20px; }
    @media (max-width: 600px){
      header{ flex-direction:column; align-items:flex-start;}
      nav{ flex-direction:column; gap:10px; width:100%;}
    }
  </style>
</head>
<body>
  <header>
    <h1>BabyQ</h1>
    <nav>
      <a href="{{ url_for('index') }}">Get Your BabyQ Score</a>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('risk_form') }}">Pregnancy Risk Profile</a>
      <a href="{{ url_for('news') }}">Pregnancy Health News</a>
      <a href="/static/babyq_full_evidence_protected.html">References</a>
      <a href="/stacy">Ask Stacy</a>
      <a href="/feedback">Feedback</a>
      <a href="{{ url_for('login_bp.login') }}">Logout</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
