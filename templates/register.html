<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crea tu cuenta BabyQ</title>

  <style>
    :root {
      --bg-main: #FFF8F8;
      --bg-soft: #E6DDF5;
      --bg-card: #ffffff;
      --text-main: #342447;
      --text-soft: #66577a;
      --purple: #6A1B9B;
      --purple-dark: #53157a;
      --border: #ddcdea;
      --shadow: 0 18px 40px rgba(106, 27, 155, 0.10);
    }

    body {
      margin: 0;
      font-family: "Nunito", Arial, sans-serif;
      background: var(--bg-soft);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .form-container {
      background: var(--bg-card);
      padding: 2.5rem 2.2rem;
      border-radius: 22px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
    }

    .form-container h2 {
      text-align: center;
      color: var(--purple);
      font-family: "Poppins", "Montserrat", Arial;
      margin-bottom: 0.8rem;
      font-size: 1.9rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
      color: var(--purple);
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--purple);
    }

    .password-container {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--purple);
    }

    .hint {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: -0.6rem;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 24px rgba(106, 27, 155, 0.18);
    }

    button:hover {
      background: var(--purple-dark);
      transform: translateY(-1px);
    }

    .login-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.95rem;
    }

    .login-link a {
      color: var(--purple);
      font-weight: 700;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>Crea tu cuenta BabyQ</h2>

    <p class="subtitle">
      Guarda tus puntajes BabyQ y sigue tu progreso con el tiempo.
    </p>

    <!-- NEW: stronger existing user prompt -->
    <div class="login-link" style="margin-top:0; margin-bottom:1rem;">
      ¿Ya tienes una cuenta?
      <a href="{{ url_for('login_bp.login') }}">Inicia sesión aquí</a>
    </div>

    <form method="POST" action="{{ url_for('register_bp.register') }}">

      <label>Nombre de usuario</label>
      <input type="text"
             name="username"
             minlength="6"
             maxlength="12"
             pattern="[A-Za-z0-9]+"
             required>
      <div class="hint">6–12 caracteres (solo letras y números)</div>

      <label>Correo electrónico</label>
      <input type="email" name="email" required>

      <label>País o región</label>
      <select name="country" required>
        <option value="" disabled selected>Selecciona tu país o región</option>
        <option value="United States">Estados Unidos</option>
        <option value="Canada">Canadá</option>
        <option value="Mexico">México</option>
        <option value="Central America">Centroamérica</option>
        <option value="South America">Sudamérica</option>
      </select>

      <label>Contraseña</label>
      <div class="password-container">
        <input type="password"
               id="reg-password"
               name="password"
               minlength="8"
               pattern="[A-Za-z0-9]+"
               required>
        <span class="toggle-eye" onclick="toggleRegPassword()">👁️</span>
      </div>
      <div class="hint">Mínimo 8 caracteres</div>

      <label>Año de nacimiento</label>
      <select name="year_of_birth" required>
        {% for year in range(1950, 2025) %}
          <option value="{{ year }}">{{ year }}</option>
        {% endfor %}
      </select>

      <label>Mes probable de parto</label>
      <select name="due_month" required>
        {% for month in ["January","February","March","April","May","June",
                         "July","August","September","October","November","December"] %}
          <option value="{{ month }}">{{ month }}</option>
        {% endfor %}
      </select>

      <button type="submit">Registrarse</button>
    </form>

    <div class="login-link">
      ¿Ya tiene una cuenta?
      <a href="{{ url_for('login_bp.login') }}">Inicie sesión</a>
    </div>
  </div>

  <script>
    function toggleRegPassword() {
      const input = document.getElementById('reg-password');
      input.type = (input.type === 'password') ? 'text' : 'password';
    }
  </script>

</body>
</html>
